datasets:
    - uuid: quarkus_repos
      url: https://api.github.com/search/repositories?q=quarkus&sort=updated&per_page=30
      cacheEnabled: true
      expression: >-
          $.items.[
              [$.full_name, $.description, $.stargazers_count, $.language, $.updated_at]
          ]
      columns:
          - id: Repository
            type: LABEL
          - id: Description
            type: LABEL
          - id: Stars
            type: NUMBER
          - id: Language
            type: LABEL
          - id: Updated
            type: LABEL
pages:
    - components:
          - html: >-
                <p style="font-size: x-large"><strong>Quarkus Repositories</strong></p>
                <small>Recently updated repositories matching "quarkus" on GitHub</small>
                <hr />
          - displayer:
                chart:
                    height: 600
                    resizable: true
                lookup:
                    uuid: quarkus_repos
